global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
      group_wait: 5s
      repeat_interval: 1h

receivers:
  - name: "default"
    # In production: webhook, email, Slack, PagerDuty, etc.
    # For the homework, alerts are visible in Grafana and AlertManager UI
    webhook_configs: []

  - name: "critical-alerts"
    webhook_configs: []
    # Example for production:
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
    #     channel: "#alerts-critical"
    #     title: "{{ .GroupLabels.alertname }}"
    #     text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
