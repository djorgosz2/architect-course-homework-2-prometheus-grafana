services:
  # ─── Sample Application ───────────────────────────────────────────────
  myapp-backend:
    build: ./sample-app
    ports:
      - "127.0.0.1:8000:8000"   # Application API
      - "127.0.0.1:9464:9464"   # Prometheus metrics
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Load Generator (simulates traffic for demo purposes) ─────────────
  load-generator:
    image: curlimages/curl:latest
    depends_on:
      myapp-backend:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Starting load generator..."
        while true; do
          # Mix of endpoints to generate diverse metrics
          curl -s http://myapp-backend:8000/api/items > /dev/null
          curl -s http://myapp-backend:8000/api/items/1 > /dev/null
          curl -s http://myapp-backend:8000/api/items/42 > /dev/null
          curl -s http://myapp-backend:8000/api/items/999 > /dev/null  # triggers 404
          curl -s -X POST http://myapp-backend:8000/api/process > /dev/null  # slow + occasional 500
          sleep 0.5
        done

  # ─── Prometheus ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      myapp-backend:
        condition: service_healthy

  # ─── Alertmanager ─────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.28.1
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  # ─── Grafana ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Auto-provision the Prometheus datasource with a known UID
      - GF_DATASOURCES_DEFAULT_UID=PBFA97CFB590B2093
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - alertmanager

  # ─── cAdvisor (container metrics, like kubelet in K8s) ────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true

  # ─── Node Exporter (host metrics, like node-exporter DaemonSet in K8s)
  node-exporter:
    image: prom/node-exporter:v1.8.2
    ports:
      - "127.0.0.1:9100:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

volumes:
  prometheus-data:
  grafana-data:
